{% extends "portofolio/base.html" %}

{% block content %}

<section class="owner">

    <div class="owner-card">

        {% if owner.foto %}
            <img class="owner-photo" src="{{ owner.foto.url }}" alt="{{ owner.nome }}">
        {% endif %}

        <div class="owner-info">

            <h2>{{ owner.nome }}</h2>

            <h3>{{ owner.titulo }}</h3>

            <p>{{ owner.bio }}</p>

            <p><strong>Email:</strong> {{ owner.email }}</p>

            <div class="owner-links">
                <a href="{{ owner.github }}" target="_blank">GitHub</a>
                <a href="{{ owner.linkedin }}" target="_blank">LinkedIn</a>
            </div>

        </div>

    </div>

{% endblock %}
