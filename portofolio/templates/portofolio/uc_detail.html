{% extends "portofolio/base.html" %}

{% block content %}

<article>

<h2>{{ uc.nome }}</h2>

{% if uc.imagem %}
<img class="project-image" src="{{ uc.imagem.url }}" alt="{{ uc.nome }}">
{% endif %}

<p>{{ uc.descricao }}</p>

<p><strong>Ano:</strong> {{ uc.ano }}</p>

<p><strong>Semestre:</strong> {{ uc.semestre }}</p>

<p><strong>ECTS:</strong> {{ uc.ects }}</p>

<p><strong>Licenciatura:</strong> {{ uc.licenciatura.nome }}</p>

</article>

{% endblock %}
